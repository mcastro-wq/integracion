<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SSI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 30px; }
        .mef-card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .header-mef { background: #801616; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="mef-card">
        <div class="header-mef">
            <h4 class="mb-0">SEGURIDAD DE INVERSIONES - DATA ACTUALIZADA</h4>
        </div>
        <div class="p-4">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>CUI</th>
                        <th>Nombre del Proyecto</th>
                        <th class="text-end">Costo (S/)</th>
                        <th>Situación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr><td colspan="5" class="text-center text-muted">Cargando datos del servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function consultarDataMEF() {
    const cui = "2199528";
    // Probamos con un proxy diferente y más estable
    const proxyUrl = "https://corsproxy.io/?";
    const targetUrl = `https://ofi5.mef.gob.pe/ssi/Home/BusquedaCUI?codigo=${cui}`;

    const tabla = document.getElementById("tabla-cuerpo");

    try {
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
        
        if (!response.ok) throw new Error("Error en respuesta del servidor");
        
        const data = await response.json();
        
        // El MEF a veces devuelve una lista [] o un objeto {}
        const info = Array.isArray(data) ? data[0] : data;

        if (info && info.CO_INVERSION) {
            tabla.innerHTML = `
                <tr>
                    <td class="fw-bold text-primary">${info.CO_INVERSION}</td>
                    <td style="font-size: 0.85rem;">${info.NO_INVERSION}</td>
                    <td class="text-end fw-bold">S/ ${info.AM_COSTO_ACTUALIZADO.toLocaleString('es-PE', {minimumFractionDigits: 2})}</td>
                    <td><span class="badge bg-info text-dark">${info.DES_SITUACION || 'VIABLE'}</span></td>
                    <td><span class="status-pill">${info.DES_ESTADO}</span></td>
                </tr>
            `;
        } else {
            throw new Error("Formato de datos no reconocido");
        }
    } catch (error) {
        console.error("Fallo de conexión:", error);
        tabla.innerHTML = `
            <tr>
                <td colspan="5" class="text-center">
                    <div class="alert alert-warning mb-0">
                        El MEF está saturado o bloqueando la conexión. <br>
                        <small>Intente recargar la página en unos segundos.</small>
                    </div>
                </td>
            </tr>`;
    }
}

window.onload = consultarDataMEF;
</script>
</body>
</html>

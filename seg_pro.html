<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SSI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 30px; }
        .mef-card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .header-mef { background: #801616; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="mef-card">
        <div class="header-mef">
            <h4 class="mb-0">SEGURIDAD DE INVERSIONES - DATA ACTUALIZADA</h4>
        </div>
        <div class="p-4">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>CUI</th>
                        <th>Nombre del Proyecto</th>
                        <th class="text-end">Costo (S/)</th>
                        <th>Situación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr><td colspan="5" class="text-center text-muted">Cargando datos del servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function consultarDataMEF() {
    const cui = "2199528";
    // Usamos un proxy que añade las cabeceras necesarias automáticamente
    const proxyUrl = "https://api.allorigins.win/get?url=";
    const targetUrl = `https://ofi5.mef.gob.pe/ssi/Home/BusquedaCUI?codigo=${cui}`;

    try {
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
        const data = await response.json();
        
        // La data viene dentro de 'contents' como un texto JSON
        const info = JSON.parse(data.contents);

        if (info) {
            document.getElementById("tabla-cuerpo").innerHTML = `
                <tr>
                    <td class="fw-bold">${info.CO_INVERSION}</td>
                    <td>${info.NO_INVERSION}</td>
                    <td class="text-end">S/ ${info.AM_COSTO_ACTUALIZADO.toLocaleString()}</td>
                    <td>${info.DES_SITUACION || 'VIABLE'}</td>
                    <td><span class="badge bg-success">${info.DES_ESTADO}</span></td>
                </tr>
            `;
        }
    } catch (error) {
        console.error("Error capturando data:", error);
        document.getElementById("tabla-cuerpo").innerHTML = '<tr><td colspan="5" class="text-danger text-center">Error: El MEF no respondió a la consulta.</td></tr>';
    }
}

window.onload = consultarDataMEF;
</script>
</body>
</html>

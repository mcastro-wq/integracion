<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SSI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 30px; }
        .mef-card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .header-mef { background: #801616; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="mef-card">
        <div class="header-mef">
            <h4 class="mb-0">SEGURIDAD DE INVERSIONES - DATA ACTUALIZADA</h4>
        </div>
        <div class="p-4">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>CUI</th>
                        <th>Nombre del Proyecto</th>
                        <th class="text-end">Costo (S/)</th>
                        <th>Situación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr><td colspan="5" class="text-center text-muted">Cargando datos del servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
 async function cargarDatos() {
    const cui = "2199528";
    // Este proxy permite que el navegador lea el MEF sin bloqueos de seguridad
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://ofi5.mef.gob.pe/ssi/Home/ArquitecturaCUI?codigo=' + cui)}`;

    try {
        const res = await fetch(url);
        const json = await res.json();
        const parser = new DOMParser();
        const doc = parser.parseFromString(json.contents, 'text/html');

        // Extraemos directamente del HTML del MEF
        const nombre = doc.getElementById("td_nominv")?.innerText || "No encontrado";
        const monto = doc.getElementById("val_cta")?.innerText || "0.00";

        // Aquí rellenas tu tabla directamente
        document.getElementById("tabla-cuerpo").innerHTML = `
            <tr>
                <td>${cui}</td>
                <td>${nombre}</td>
                <td>S/ ${monto}</td>
                <td>ACTUALIZADO</td>
            </tr>
        `;
    } catch (e) {
        console.log("Error de conexión directa");
    }
}

    window.onload = cargarDatos;
</script>
</body>
</html>

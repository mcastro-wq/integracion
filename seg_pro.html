<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento MEF Realtime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .monto { font-family: monospace; font-weight: bold; color: #2c3e50; }
        .status-active { background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h3 class="text-danger fw-bold mb-4">SEGURIDAD DE INVERSIONES - DATA REAL</h3>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>CUI</th>
                        <th>Nombre de la Inversión</th>
                        <th>Costo Actualizado</th>
                        <th>Situación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-mef">
                    <tr><td colspan="5" class="text-center">Consultando al MEF...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function consultarMEF(cui) {
    // Usamos AllOrigins para saltar el bloqueo de seguridad (CORS)
    const proxy = "https://api.allorigins.win/get?url=";
    const urlMef = `https://ofi5.mef.gob.pe/ssi/Home/ArquitecturaCUI?codigo=${cui}`;
    
    try {
        const response = await fetch(proxy + encodeURIComponent(urlMef));
        const data = await response.json();
        
        // Convertimos el texto recibido en HTML manejable
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, "text/html");

        // Extraemos los datos usando los IDs que me pasaste del código fuente
        const nombre = doc.getElementById("td_nominv")?.innerText.trim() || "No encontrado";
        const costo = doc.getElementById("val_cta")?.innerText.trim() || "0.00";
        const situacion = doc.getElementById("td_situinv")?.innerText.trim() || "N/A";
        const estado = doc.getElementById("td_estcu")?.innerText.trim() || "ACTIVO";

        document.getElementById("tabla-mef").innerHTML = `
            <tr>
                <td class="fw-bold">${cui}</td>
                <td style="font-size: 0.85rem; max-width: 400px;">${nombre}</td>
                <td class="monto">S/ ${costo}</td>
                <td>${situacion}</td>
                <td><span class="status-active">${estado}</span></td>
            </tr>
        `;
    } catch (e) {
        document.getElementById("tabla-mef").innerHTML = `<tr><td colspan="5" class="text-danger">Error conectando al MEF</td></tr>`;
    }
}

// Ejecutar al cargar con el CUI de tu imagen
consultarMEF("2199528");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE CONTROL DE INVERSIONES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding: 20px; }
        .header-red { background: #900; color: white; padding: 15px; border-radius: 10px 10px 0 0; }
        iframe { width: 100%; height: 600px; border: none; border-radius: 0 0 10px 10px; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-red text-center">
        <h3 class="mb-0">CONSULTA SSI - MEF EN TIEMPO REAL</h3>
    </div>
    
    <div class="bg-white p-3 border-bottom">
        <div class="input-group">
            <input type="text" id="cuiInput" class="form-control" placeholder="Ingrese CUI (ej. 2199528)">
            <button class="btn btn-danger" onclick="cambiarCUI()">CONSULTAR PROYECTO</button>
        </div>
    </div>

    <div id="contenedorIframe">
        <iframe id="visorMef" src="https://ofi5.mef.gob.pe/ssi/ssi/Index?codigo=2199528"></iframe>
    </div>
</div>

<script>
function cambiarCUI() {
    const cui = document.getElementById('cuiInput').value;
    if(cui) {
        // Cambiamos la fuente del visor al reporte oficial directo
        document.getElementById('visorMef').src = `https://ofi5.mef.gob.pe/ssi/ssi/Index?codigo=${cui}`;
    }
}
</script>

</body>
</html>

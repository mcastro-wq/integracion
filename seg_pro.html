<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SSI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 30px; }
        .mef-card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .header-mef { background: #801616; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="mef-card">
        <div class="header-mef">
            <h4 class="mb-0">SEGURIDAD DE INVERSIONES - DATA ACTUALIZADA</h4>
        </div>
        <div class="p-4">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>CUI</th>
                        <th>Nombre del Proyecto</th>
                        <th class="text-end">Costo (S/)</th>
                        <th>Situación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr><td colspan="5" class="text-center text-muted">Cargando datos del servidor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function cargarDatos() {
        try {
            // Buscamos el archivo que genera el robot
            const res = await fetch('data.json?t=' + new Date().getTime());
            const datos = await res.json();
            
            const tbody = document.getElementById('tabla-cuerpo');
            tbody.innerHTML = '';

            if (datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">El archivo data.json está vacío. Ejecuta el Scraper en Actions.</td></tr>';
                return;
            }

            datos.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-primary">${item.cui}</td>
                        <td style="font-size: 0.8rem; width: 45%;">${item.nombre}</td>
                        <td class="text-end fw-bold">S/ ${item.pim.toLocaleString()}</td>
                        <td>${item.situacion}</td>
                        <td><span class="status-pill">${item.estado}</span></td>
                    </tr>
                `;
            });
        } catch (error) {
            document.getElementById('tabla-cuerpo').innerHTML = `
                <tr><td colspan="5" class="text-center text-danger">
                    Error: No se encontró data.json. <br>
                    Asegúrate de ejecutar el "Action" en GitHub primero.
                </td></tr>`;
        }
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
